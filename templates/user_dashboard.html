<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>User Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f2f2f2;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .container{
            width:500px;
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            color:#1e3c72;
            margin-bottom:10px;
            font-size:28px;
        }

        h2{
            text-align:center;
            color:#333;
            margin-bottom:25px;
            font-size:22px;
        }

        form{
            width:100%;
        }

        input,
        select{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:15px;
            transition:0.3s;
        }

        input:focus,
        select:focus{
            border-color:#007bff;
            outline:none;
            box-shadow:0px 0px 5px rgba(0,123,255,0.3);
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0056b3;
        }

        .logout{
            text-align:center;
            margin-top:20px;
        }

        .logout a{
            text-decoration:none;
            color:red;
            font-weight:bold;
        }

        .logout a:hover{
            text-decoration:underline;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>
            AI-Based Online Fraud Transaction Detection System
        </h1>

        <h2>
            User Dashboard
        </h2>

        <form action="/predict" method="POST">

            <input 
                type="number"
                name="step"
                placeholder="Transaction Hour"
                required
            >

            <select name="type" required>

                <option value="">
                    Select Transaction Type
                </option>

                <option value="0">
                    PAYMENT
                </option>

                <option value="1">
                    TRANSFER
                </option>

                <option value="2">
                    CASH_OUT
                </option>

                <option value="3">
                    DEBIT
                </option>

                <option value="4">
                    CASH_IN
                </option>

            </select>

            <input 
                type="number"
                name="amount"
                placeholder="Amount"
                required
            >

            <input 
                type="number"
                name="oldbalanceOrg"
                placeholder="Old Sender Balance"
                required
            >

            <input 
                type="number"
                name="newbalanceOrig"
                placeholder="New Sender Balance"
                required
            >

            <input 
                type="number"
                name="oldbalanceDest"
                placeholder="Old Receiver Balance"
                required
            >

            <input 
                type="number"
                name="newbalanceDest"
                placeholder="New Receiver Balance"
                required
            >

            <select name="device_change" required>

                <option value="">
                    Device Change
                </option>

                <option value="0">
                    No
                </option>

                <option value="1">
                    Yes
                </option>

            </select>

            <select name="location_change" required>

                <option value="">
                    Location Change
                </option>

                <option value="0">
                    No
                </option>

                <option value="1">
                    Yes
                </option>

            </select>

            <button type="submit">

                Predict Transaction

            </button>

        </form>

        <div class="logout">

            <a href="/logout">
                Logout
            </a>

        </div>

    </div>

</body>

</html>
