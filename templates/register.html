<!DOCTYPE html>
<html>
<head>
    <title>Register - AI-Based Fraud Detection System</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 380px;
            box-shadow: 0px 0px 10px #aaa;
        }

        h1 {
            font-size: 18px;
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        .links {
            text-align: center;
            margin-top: 10px;
        }

        .links a {
            text-decoration: none;
            color: #007bff;
        }

        /* password box */
        .password-box {
            position: relative;
        }

        .toggle-eye {
            position: absolute;
            right: 10px;
            top: 12px;
            cursor: pointer;
            user-select: none;
            font-size: 16px;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>AI-Based Online Fraud Transaction Detection System</h1>
    <h2>Register</h2>

    <form method="POST" action="/send_otp" autocomplete="off">

        <input type="text" name="username" placeholder="Username" required autocomplete="off">

        <input type="email" name="email" placeholder="Email" required autocomplete="off">

        <div class="password-box">

            <input type="password" id="password" name="password" placeholder="Password" required autocomplete="new-password">

            <span class="toggle-eye" onclick="togglePassword()">
                👁️
            </span>

        </div>

        <button type="submit">Send OTP</button>

    </form>

    <div class="links">
        <p><a href="/login">Already have an account? Login</a></p>
    </div>

</div>

<script>
function togglePassword() {
    var pass = document.getElementById("password");

    if (pass.type === "password") {
        pass.type = "text";
    } else {
        pass.type = "password";
    }
}
</script>

</body>
</html>
