<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reset Password</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f2f2f2;
        }

        .container{
            width:400px;
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            color:#1e3c72;
            font-size:24px;
            margin-bottom:10px;
        }

        h2{
            text-align:center;
            color:#333;
            margin-bottom:25px;
        }

        .input-box{
            width:100%;
            margin-bottom:18px;
        }

        .input-box input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:15px;
            transition:0.3s;
        }

        .input-box input:focus{
            border-color:#007bff;
            outline:none;
            box-shadow:0px 0px 5px rgba(0,123,255,0.3);
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0056b3;
        }

        .back-link{
            text-align:center;
            margin-top:18px;
        }

        .back-link a{
            text-decoration:none;
            color:#007bff;
            font-weight:bold;
        }

        .back-link a:hover{
            text-decoration:underline;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>
           AI-Based Online Fraud Transaction Detection System
        </h1>

        <h2>
            Reset Password
        </h2>

        <form method="POST" action="/reset_password">

            <div class="input-box">

                <input 
                    type="password"
                    name="password"
                    placeholder="New Password"
                    required
                >

            </div>

            <button type="submit">
                Update Password
            </button>

        </form>

        <div class="back-link">

            <a href="/login">
                Back to Login
            </a>

        </div>

    </div>

</body>

</html>
