<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI-Based Online Fraud Transaction Detection System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f2f2f2;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .container{
            width:500px;
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            color:#1e3c72;
            margin-bottom:25px;
            font-size:28px;
        }

        form{
            width:100%;
        }

        input,
        select{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:15px;
            transition:0.3s;
        }

        input:focus,
        select:focus{
            border-color:#007bff;
            outline:none;
            box-shadow:0px 0px 5px rgba(0,123,255,0.3);
        }

        .row{
            display:flex;
            gap:10px;
        }

        .row input{
            flex:2;
        }

        .row select{
            flex:1;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0056b3;
        }

        .logout{
            margin-top:20px;
            text-align:center;
        }

        .logout a{
            text-decoration:none;
            color:red;
            font-weight:bold;
        }

        .logout a:hover{
            text-decoration:underline;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>
        UPI Fraud Detection System
    </h1>

    <form action="/predict" method="POST">

        <!-- Transaction Time -->
        <div class="row">

            <input 
                type="number" 
                name="hour"
                placeholder="Hour (1-12)"
                min="1"
                max="12"
                required
            >

            <select name="ampm" required>

                <option value="AM">
                    AM
                </option>

                <option value="PM">
                    PM
                </option>

            </select>

        </div>

        <!-- Transaction Type -->
        <select name="type" required>

            <option value="0">
                PAYMENT
            </option>

            <option value="1">
                TRANSFER
            </option>

            <option value="2">
                CASH_OUT
            </option>

            <option value="3">
                DEBIT
            </option>

            <option value="4">
                CASH_IN
            </option>

        </select>

        <!-- Amount -->
        <input 
            type="number"
            name="amount"
            placeholder="Amount"
            step="0.01"
            required
        >

        <!-- Sender -->
        <input 
            type="number"
            name="oldbalanceOrg"
            placeholder="Old Sender Balance"
            step="0.01"
            required
        >

        <input 
            type="number"
            name="newbalanceOrig"
            placeholder="New Sender Balance"
            step="0.01"
            required
        >

        <!-- Receiver -->
        <input 
            type="number"
            name="oldbalanceDest"
            placeholder="Old Receiver Balance"
            step="0.01"
            required
        >

        <input 
            type="number"
            name="newbalanceDest"
            placeholder="New Receiver Balance"
            step="0.01"
            required
        >

        <!-- Device Change -->
        <select name="device_change" required>

            <option value="">
                Device Change (0/1)
            </option>

            <option value="0">
                No Device Change
            </option>

            <option value="1">
                Device Changed
            </option>

        </select>

        <!-- Location Change -->
        <select name="location_change" required>

            <option value="">
                Location Change (0/1)
            </option>

            <option value="0">
                Same Location
            </option>

            <option value="1">
                New Location
            </option>

        </select>

        <button type="submit">
            Predict Transaction
        </button>

    </form>

    <div class="logout">

        <a href="/logout">
            Logout
        </a>

    </div>

</div>

</body>

</html>
